name: LiveLens
options:
  bundleIdPrefix: com.livelens
  deploymentTarget:
    iOS: "16.0"
  defaultConfig: Debug
  xcodeVersion: "15"

packages:
  FirebaseFirestore:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "10.0.0"
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "11.0.0"

schemes:
  LiveLens:
    build:
      targets:
        LiveLens: all
    run:
      config: Debug

targets:
  LiveLens:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: App
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: LiveLens
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchStoryboardName: Launch Screen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: ""
        GADApplicationIdentifier: ca-app-pub-2494717257898446~8101804143
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
          - SKAdNetworkIdentifier: 4fzdc2evr5.skadnetwork
          - SKAdNetworkIdentifier: 4pfyvq9l8r.skadnetwork
          - SKAdNetworkIdentifier: 2fnua5tdw4.skadnetwork
          - SKAdNetworkIdentifier: ydx93a7ass.skadnetwork
          - SKAdNetworkIdentifier: 5a6flpkh64.skadnetwork
          - SKAdNetworkIdentifier: p78axxw29g.skadnetwork
          - SKAdNetworkIdentifier: v72qych5uu.skadnetwork
          - SKAdNetworkIdentifier: ludvb6z3bs.skadnetwork
          - SKAdNetworkIdentifier: cp8zw746q7.skadnetwork
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.livelens.app
      SWIFT_VERSION: "5.9"
      TARGETED_DEVICE_FAMILY: "1"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: FirebaseFirestore
        product: FirebaseFirestore
      - package: FirebaseFirestore
        product: FirebaseMessaging
      - package: FirebaseFirestore
        product: FirebaseFunctions
      - package: GoogleMobileAds
        product: GoogleMobileAds
    preBuildScripts:
      - name: Firebase GoogleService-Info Check
        script: |
          if [ ! -f "${SRCROOT}/App/GoogleService-Info.plist" ]; then
            echo "warning: GoogleService-Info.plist が見つかりません。Firebase Consoleからダウンロードして追加してください。"
          fi
